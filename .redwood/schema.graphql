  projectDatas: [ProjectData!]!

  """Fetches the Redwood root schema."""
  redwood: Redwood
  service(id: Int!): Service
  serviceBySlug(slug: String!): Service
  services: [Service!]!
  siteSetting(id: Int!): SiteSetting
  siteSettingByKey(key: String!): SiteSetting
